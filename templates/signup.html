<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account - ScoutVision Gemini Sandbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
      body { background: #f8f9fb; }
      main { max-width: 480px; }
    </style>
  </head>
  <body>
    <main class="container py-5">
      <section class="card shadow-sm">
        <div class="card-body">
          <h1 class="h3 mb-1">Create Account</h1>
          <p class="text-secondary mb-4">Create a tester account to review player reels with Gemini.</p>
          <form action="{{ url_for('signup') }}" method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">Name</label>
              <input class="form-control"
                     type="text"
                     name="name"
                     autocomplete="name"
                     required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input class="form-control"
                     type="email"
                     name="email"
                     autocomplete="email"
                     required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input class="form-control"
                     type="password"
                     name="password"
                     autocomplete="new-password"
                     required>
              <div class="form-text">Use at least 8 characters.</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Confirm password</label>
              <input class="form-control"
                     type="password"
                     name="confirm_password"
                     autocomplete="new-password"
                     required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Create Account</button>
          </form>
          {% if error %}<div class="alert alert-danger mt-3 mb-0">{{ error }}</div>{% endif %}
          <p class="small text-secondary mt-4 mb-0">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
