<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Users - ScoutVision Gemini Sandbox</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 960px;
        margin: 32px auto;
        line-height: 1.4;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        border-bottom: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      .logout-form { margin: 0; }
      button { padding: 8px 12px; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <p><a href="{{ url_for('index') }}">Back</a></p>
      <form class="logout-form" action="{{ url_for('logout') }}" method="post">
        <span>{{ current_user.name }} ({{ current_user.role }})</span>
        <button type="submit">Logout</button>
      </form>
    </div>

    <h1>Users</h1>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Active</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
          <tr>
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>{{ "yes" if user.is_active else "no" }}</td>
            <td>{{ user.created_at }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
