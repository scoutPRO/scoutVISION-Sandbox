<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Users - ScoutVision Gemini Sandbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
      body { background: #f8f9fb; }
      main { max-width: 1040px; }
    </style>
  </head>
  <body>
    <main class="container py-4">
      <header class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <a class="small" href="{{ url_for('index') }}">Back to Reviews</a>
          <h1 class="h3 mt-2 mb-1">Users</h1>
          <p class="text-secondary mb-0">Review Accounts</p>
        </div>
        <form class="d-flex align-items-center gap-3 mb-0"
              action="{{ url_for('logout') }}"
              method="post">
          <span class="text-secondary small">{{ current_user.name }} · Admin</span>
          <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
        </form>
      </header>
      <section class="card shadow-sm">
        <div class="table-responsive">
          <table class="table align-middle mb-0">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Active</th>
                <th>Created</th>
              </tr>
            </thead>
            <tbody>
              {% for user in users %}
                <tr>
                  <td>{{ user.name }}</td>
                  <td>{{ user.email }}</td>
                  <td>
                    <span class="badge text-bg-light">{{ user.role|title }}</span>
                  </td>
                  <td>{{ "Yes" if user.is_active else "No" }}</td>
                  <td class="text-secondary small">{{ user.created_at }}</td>
                </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
