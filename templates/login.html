<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - ScoutVision Gemini Sandbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
      body { background: #f8f9fb; }
      .login-container {
        max-width: 360px;
        min-width: 320px;
        width: 25%;
      }
      @media (max-width: 576px) {
        .login-container {
          min-width: 0;
          width: calc(100% - 2rem);
        }
      }
    </style>
  </head>
  <body>
    <main class="login-container mx-auto py-5">
      <section class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-1">ScoutVision Gemini Sandbox</h1>
          <p class="text-secondary mb-4">Login to review player reels</p>
          <form action="{{ url_for('login') }}" method="post">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input class="form-control"
                     type="email"
                     name="email"
                     autocomplete="email"
                     required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input class="form-control"
                     type="password"
                     name="password"
                     autocomplete="current-password"
                     required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
          {% if error %}<div class="alert alert-danger mt-3 mb-0">{{ error }}</div>{% endif %}
          <div class="mt-4 small text-secondary">
            {% if allow_signup %}
              <p class="mb-2">
                Need an account? <a href="{{ url_for('signup') }}">Create One</a>.
              </p>
            {% endif %}
            <p class="mb-0">Forgot your password? Contact your ScoutVision admin to reset it.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
