<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Login - ScoutVision Gemini Sandbox</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 420px;
        margin: 72px auto;
        line-height: 1.4;
      }
      label { display: block; margin-top: 16px; font-weight: 600; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
      }
      button { margin-top: 16px; padding: 8px 12px; }
      .error { color: #a40000; font-weight: 600; }
    </style>
  </head>
  <body>
    <h1>ScoutVision Gemini Sandbox</h1>
    <form action="{{ url_for('login') }}" method="post">
      <input type="hidden" name="next" value="{{ next_url }}">

      <label>Email</label>
      <input type="email" name="email" autocomplete="email" required>

      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>

      <button type="submit">Login</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    {% if allow_signup %}
      <p>Need an account? <a href="{{ url_for('signup') }}">Create one</a>.</p>
    {% endif %}
    <p>
      Forgot your password? Contact your ScoutVision admin to reset it.
    </p>
  </body>
</html>
