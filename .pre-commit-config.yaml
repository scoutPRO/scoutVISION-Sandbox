repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: poetry run ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format --check
        language: system
        types_or: [python, pyi]
      - id: djlint
        name: djlint
        entry: poetry run djlint templates --check --lint
        language: system
        pass_filenames: false
        types: [html]
